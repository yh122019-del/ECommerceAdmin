{% extends "base.html" %}

{% block title %}用户下单{% endblock %}

{% block content %}
<!-- 下单表单居中显示 -->
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="fw-bold mb-4">用户下单</h1>

                {% if message %}
                <div class="alert alert-danger">{{ message }}</div>
                {% endif %}

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">选择商品</label>
                        <select class="form-select" name="product_id" required>
                            {% for product in products %}
                            <option value="{{ product.product_id }}">
                                {{ product.name }} - 价格：{{ product.price }} - 库存：{{ product.stock }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">购买数量</label>
                        <input class="form-control" type="number" name="quantity" min="1" required>
                    </div>

                    <button class="btn btn-primary" type="submit">提交订单</button>
                    <a class="btn btn-outline-secondary ms-2" href="{{ url_for('orders') }}">返回订单列表</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
