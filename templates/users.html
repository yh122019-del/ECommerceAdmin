{% extends "base.html" %}

{% block title %}用户管理{% endblock %}

{% block content %}
<div class="mb-3">
    <h1 class="fw-bold mb-1">用户管理</h1>
    <p class="text-muted mb-0">管理员可以查看系统中所有用户和角色。</p>
</div>

<!-- 用户管理页面，仅管理员可访问 -->
<div class="card shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>用户名</th>
                        <th>角色</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.username }}</td>
                        <td>
                            {% if user.role == "admin" %}
                            <span class="badge text-bg-primary">管理员</span>
                            {% else %}
                            <span class="badge text-bg-secondary">普通用户</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td class="text-center text-muted" colspan="2">暂无用户</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
